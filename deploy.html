    const ABI = [];
    let provider, signer;
    
    async function initProvider() {
      if (!window.ethereum) throw new Error('No wallet');
      provider = new ethers.BrowserProvider(window.ethereum);
      signer = await provider.getSigner();
    }
    
    deployBtn.addEventListener('click', async () => {
      if (!window.ethereum) {
        output.innerHTML = '<span class="error">No wallet! Use MetaMask/Kastle.</span>';
        return;
      }
      
      try {
        output.innerHTML = '<span class="info">Connecting to wallet...</span>';
        await initProvider();
        
        const network = await provider.getNetwork();
        
        if (network.chainId !== BigInt(IGRA_CHAIN_ID)) {
          output.innerHTML = '<span class="info">Switching to Igra network...</span>';
          try {
            await window.ethereum.request({
              method: 'wallet_switchEthereumChain',
              params: [{ chainId: '0x' + IGRA_CHAIN_ID.toString(16) }]
            });
          } catch (e) {
            throw new Error('Switch to Igra Galleon Testnet (38836) first');
          }
        }
        
        signer = await provider.getSigner();
        const factory = new ethers.ContractFactory(ABI, BYTECODE, signer);
        
        output.innerHTML = '<span class="info">Deploying contract...</span>';
        deployBtn.disabled = true;
        
        const gasPrice = ethers.parseUnits('2200', 'gwei');
        const contract = await factory.deploy({ gasLimit: 500000, gasPrice: gasPrice });
        
        output.innerHTML = '<span class="info">Waiting for confirmation...</span>';
        
        const tx = contract.deploymentTransaction();
        const receipt = await tx.wait();
        
        const addr = receipt.contractAddress;
        
        output.innerHTML = 'DEPLOYED!\n\nContract Address:\n' + addr + '\n\nNEXT: Update frontend/index.html with:\nlet ORACLE_ADDRESS = \'' + addr + '\';';
